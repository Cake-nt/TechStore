<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página no encontrada - TechStore</title>
    <link rel="stylesheet" href="css/estilos.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="page-404">
    <main class="error-404">
        <div class="error-contenido">
            <div class="error-ilustracion">
                <i class="fas fa-sad-tear"></i>
                <span class="error-codigo">404</span>
            </div>
            <h1>¡Ups! Página no encontrada</h1>
            <p>
                Lo sentimos, la página que buscas no existe o ha sido movida.
                <br>
                Pero no te preocupes, tenemos muchos productos increíbles esperándote.
            </p>
            <div class="error-acciones">
                <a href="index.html" class="btn-primary">
                    <i class="fas fa-home"></i> Volver al inicio
                </a>
                <a href="productos.html" class="btn-secondary">
                    <i class="fas fa-box"></i> Ver productos
                </a>
            </div>
            <div class="error-busqueda">
                <form action="productos.html" method="get">
                    <input type="search" name="busqueda" placeholder="Buscar productos..." aria-label="Buscar productos">
                    <button type="submit" aria-label="Realizar búsqueda">
                        <i class="fas fa-search"></i>
                    </button>
                </form>
            </div>
        </div>
    </main>
</body>
</html>
